<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제과·제빵 카드 연습 — 웹 실습 보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#F7F1E7;font-family:'Noto Sans KR',sans-serif;color:#3B2E22;-webkit-font-smoothing:antialiased}
a{color:#A05A24}a:hover{color:#7C4218}
button{font-family:'Noto Sans KR',sans-serif;cursor:pointer}
#root{max-width:1000px;margin:0 auto;padding:24px 16px 90px}

.top-link{border:none;background:none;color:#A05A24;font-size:14px;font-weight:700;padding:0;text-decoration:none}
.top-link:hover{color:#7C4218}
h1.page{margin:6px 0 2px;font-size:26px;font-weight:900;letter-spacing:-.5px}
.sub{margin:0;font-size:13.5px;color:#8A7360}

.chipbar{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 14px}
.chip-btn{border:1.5px solid #D9CBB6;background:#FFFDF9;color:#6B5A48;border-radius:99px;padding:8px 18px;font-size:14px;font-weight:500}
.chip-btn:hover{border-color:#A98F70}
.chip-btn.on{border-color:#3B2E22;background:#3B2E22;color:#F7F1E7;font-weight:700}

.bigbtns{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.bigbtn{flex:1;min-width:150px;border:none;border-radius:14px;padding:15px 18px;font-size:15.5px;font-weight:700;text-align:left;color:#FFF6EC}
.bigbtn small{display:block;font-size:12px;font-weight:400;opacity:.85;margin-top:3px}
.bigbtn.gwa{background:#A0511E}.bigbtn.gwa:hover{background:#83400F}
.bigbtn.bread{background:#6E6118}.bigbtn.bread:hover{background:#584D0F}

.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.item-card{background:#FFFDF9;border:1px solid #E8DCC9;border-radius:14px;padding:15px 16px;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.item-card:hover{border-color:#C89B6B;box-shadow:0 4px 16px rgba(120,80,40,.12)}
.badge{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:99px}
.badge.gwa{background:#F3E1CD;color:#8A4A15}
.badge.bread{background:#EBE6CB;color:#6A5D12}
.rec-line{font-size:11.5px;color:#3E7A3E;font-weight:700}

.head-card{background:#FFFDF9;border:1px solid #E8DCC9;border-radius:16px;padding:18px 20px;margin:14px 0 16px}
.meta-chip{font-size:12.5px;background:#F1EADF;border-radius:8px;padding:5px 11px;display:inline-block}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab{border:none;background:#EFE7D8;color:#6B5A48;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:500}
.tab:hover{background:#E5D9C4}
.tab.on{background:#3B2E22;color:#F7F1E7;font-weight:700}

.panel{background:#FFFDF9;border:1px solid #E8DCC9;border-radius:16px;padding:18px}
.panel h3{margin:0 0 4px;font-size:17px;font-weight:800}
.panel .hint{margin:0 0 14px;font-size:13px;color:#8A7360;line-height:1.6}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.act{border:1.5px solid #A0511E;background:#A0511E;color:#FFF6EC;border-radius:10px;padding:9px 16px;font-size:14px;font-weight:700}
.act:hover{background:#83400F;border-color:#83400F}
.ghost-btn{border:1px solid #D9CBB6;background:#FFFDF9;border-radius:10px;padding:9px 14px;font-size:13px;color:#6B5A48}
.ghost-btn:hover{border-color:#A98F70}
.toggle-lab{font-size:13px;color:#6B5A48;display:flex;align-items:center;gap:5px;margin-left:auto;cursor:pointer;user-select:none}

.banner{border-radius:10px;padding:12px 16px;font-size:14.5px;font-weight:700;margin-bottom:14px}
.banner.good{background:#3E7A3E;color:#F0F6EB}
.banner.bad{background:#B04A38;color:#FAEEEB}
.banner.info{background:#F3E1CD;color:#7A4415;font-weight:500}

/* 카드 */
.card{background:#FFFDF9;border:1.5px dashed #B3A48C;border-radius:10px;padding:9px 11px;display:flex;flex-direction:column;gap:4px;user-select:none;-webkit-user-select:none;touch-action:pan-y;cursor:grab;position:relative}
.card .kind{font-size:10px;font-weight:700;border-radius:99px;padding:2px 8px;align-self:flex-start}
.card.step .kind{color:#FFF6EC;background:#A0511E}
.card.ing .kind{color:#8A4A15;background:#F3E1CD}
.card.tool .kind{color:#6A5D12;background:#EBE6CB}
.card .row{display:flex;align-items:center;gap:8px;min-width:0}
.card .icon{flex:none;width:38px;height:38px;background-size:contain;background-repeat:no-repeat;background-position:center}
.card .nm{font-size:14px;font-weight:900;line-height:1.25}
.card .meta{font-size:11.5px;color:#5C4C3B}
.card .bdg{font-size:10.5px;font-weight:700;color:#8A4A15;position:absolute;top:9px;right:11px;max-width:55%;text-align:right;line-height:1.3}
.card .desc{font-size:11px;color:#5C4C3B;line-height:1.5}
.card.selected{outline:3px solid #A0511E;outline-offset:1px;box-shadow:0 4px 14px rgba(160,81,30,.25)}
.card.dragging{opacity:.35}
.card.ok-card{border:1.5px solid #BBD3AF;background:#F0F6EB}
.card.bad-card{border:1.5px solid #E3B3AB;background:#FAEEEB}
.card.sm{padding:7px 9px}
.card.sm .icon{width:30px;height:30px}
.card.sm .nm{font-size:12.5px}

#drag-ghost{position:fixed;left:0;top:0;z-index:999;pointer-events:none;opacity:.92;transform-origin:top left;box-shadow:0 10px 30px rgba(60,40,20,.3)}

/* 공정 순서 보드 */
.order-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:10px}
.slot{border:1.5px dashed #C9BBA3;border-radius:12px;min-height:88px;padding:8px;display:flex;flex-direction:column;justify-content:center;position:relative;background:#FBF7EF}
.slot .num{position:absolute;left:-1px;top:-1px;width:24px;height:24px;border-radius:12px 0 10px 0;background:#3B2E22;color:#F7F1E7;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;z-index:1}
.slot .slot-hint{font-size:11.5px;color:#B3A48C;text-align:center}
.slot.ok{border-color:#3E7A3E;background:#F0F6EB}
.slot.bad{border-color:#B04A38;background:#FAEEEB}
.slot .mark{position:absolute;right:8px;top:6px;font-size:15px;font-weight:900;z-index:1}
.slot.ok .mark{color:#3E7A3E}.slot.bad .mark{color:#B04A38}
.pool-wrap{margin-top:18px;border-top:1.5px dashed #D9CBB6;padding-top:14px}
.pool-title{font-size:13px;font-weight:800;color:#8A4A15;margin:0 0 10px}
.drop-hint{outline:3px solid #C89B6B;outline-offset:2px;background:#F8EFDF !important}
.answer-box{margin-top:14px;border:1px solid #E8DCC9;border-radius:10px;background:#F8F3EA;padding:10px 14px;font-size:13px;line-height:1.9;color:#5C4C3B}

/* 스테이션 실습 */
.st-progress{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.st-dot{width:26px;height:26px;border-radius:50%;border:1.5px solid #D9CBB6;background:#FFFDF9;color:#8A7360;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.st-dot.cur{border-color:#A0511E;background:#A0511E;color:#FFF6EC}
.st-dot.pass{border-color:#3E7A3E;background:#E4EEDF;color:#3E7A3E}
.st-dot.fail{border-color:#E3B3AB;background:#FAEEEB;color:#B04A38}
.station-head{border:2px solid #3B2E22;border-radius:12px;background:#FFFDF9;padding:12px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.station-head .snum{width:28px;height:28px;border-radius:50%;background:#A0511E;color:#FFF6EC;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex:none}
.station-head .sicon{flex:none;width:36px;height:36px;background-size:contain;background-repeat:no-repeat;background-position:center}
.station-head .snm{font-size:17px;font-weight:900}
.station-head .sbdg{font-size:11.5px;font-weight:700;color:#8A4A15;background:#F3E1CD;border-radius:99px;padding:3px 10px}
.station-head .sask{margin-left:auto;font-size:12px;color:#8A7360}
.trays{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
@media(max-width:560px){.trays{grid-template-columns:1fr}}
.tray{border:1.5px dashed #C89B6B;border-radius:12px;min-height:104px;padding:9px;background:#FDF8F1}
.tray.tool-tray{border-color:#A9A05C;background:#FBF9EC}
.tray .t-title{font-size:11.5px;font-weight:800;color:#8A4A15;margin-bottom:6px}
.tray.tool-tray .t-title{color:#6A5D12}
.tray .t-cards{display:flex;flex-wrap:wrap;gap:6px}
.tray .t-empty{font-size:11px;color:#B3A48C}
.tray .card{width:auto;min-width:118px}
.st-pools{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px;border-top:1.5px dashed #D9CBB6;padding-top:12px}
@media(max-width:700px){.st-pools{grid-template-columns:1fr}}
.st-pool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:7px}
.miss-box{border:1px solid #E3B3AB;background:#FAEEEB;border-radius:10px;padding:9px 13px;font-size:13px;color:#8A3A2B;line-height:1.7;margin-bottom:12px}
.sum-row{display:flex;gap:10px;align-items:center;border:1px solid #E8DCC9;border-radius:10px;padding:10px 14px;font-size:14px;background:#FFFDF9}
.sum-row .r-ok{color:#3E7A3E;font-weight:800}
.sum-row .r-no{color:#B04A38;font-weight:800}

.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#3B2E22;color:#F7F1E7;font-size:13.5px;font-weight:700;border-radius:99px;padding:10px 20px;z-index:1000;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center}
.toast.show{opacity:1}
.foot-note{margin:26px 0 0;font-size:12px;color:#A79680;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script>
(() => {
'use strict';

/* ───────────── SVG 아이콘 (모형 카드 엔진과 동일 스타일) ───────────── */
const svg = b => 'data:image/svg+xml,' + encodeURIComponent(

  sugar: svg('<path d="M14 36h36c0 9-8 15-18 15s-18-6-18-15z" fill="#F4B8C1"/><path d="M18 36c1-7 27-7 28 0z" fill="#FFFFFF"/><path d="M24 16l1.5 3.5 3.5 1.5-3.5 1.5-1.5 3.5-1.5-3.5-3.5-1.5 3.5-1.5z" fill="#FFF"/><path d="M41 12l1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" fill="#FFF"/><path d="M18 44c4 2.5 24 2.5 28 0" fill="none" stroke="#E48CA0" stroke-width="1.6"/>'),

  margarine: svg('<rect x="14" y="26" width="36" height="18" rx="3" fill="#F2E27A"/><rect x="21" y="17" width="16" height="11" rx="2" fill="#DFF0E4"/><path d="M10 48h44" stroke-width="2.6"/>' + eyes(26, 38, 34, 38)),

  emul: svg('<rect x="24" y="24" width="16" height="26" rx="3" fill="#DFF0E4"/><rect x="28" y="16" width="8" height="8" rx="2" fill="#B7D9C0"/><path d="M36 16l8-4" stroke-width="2.6"/><path d="M27 32h10" stroke="#7BB08A" stroke-width="1.8"/>'),

  white: svg('<path d="M14 40c0-8 8-12 18-12s18 4 18 12c0 6-8 9-18 9s-18-3-18-9z" fill="#FCFCF7"/><ellipse cx="32" cy="36" rx="5" ry="4" fill="#F7D473"/>'),
  yolk: svg('<circle cx="32" cy="34" r="16" fill="#F7C948"/><circle cx="32" cy="34" r="9" fill="#F2A93B"/>' + eyes(28, 36, 33, 37)),
  salt: svg('<path d="M24 22h16l3 24a4 4 0 0 1-4 4H25a4 4 0 0 1-4-4z" fill="#DFF0E4"/><path d="M26 22c0-7 12-7 12 0" fill="#C4E3CD"/><circle cx="30" cy="15" r="1.1" fill="#6B4423" stroke="none"/><circle cx="34" cy="15" r="1.1" fill="#6B4423" stroke="none"/>' + eyes(28, 36, 34, 39)),

  bpowder: svg('<ellipse cx="32" cy="18" rx="13" ry="5" fill="#F0A48A"/><path d="M19 18v26c0 3.5 6 6 13 6s13-2.5 13-6V18" fill="#F6C0AC"/><path d="M32 28l2 4.2 4.6.6-3.4 3.2.9 4.6-4.1-2.2-4.1 2.2.9-4.6-3.4-3.2 4.6-.6z" fill="#FFF" stroke-width="1.6"/>'),
  bsoda: svg('<path d="M18 22l4-6h20l4 6v28H18z" fill="#DCE9F2"/><path d="M18 22h28"/><path d="M26 32h12M26 38h12" stroke-width="1.6"/>'),
  vanilla: svg('<rect x="24" y="24" width="16" height="27" rx="6" fill="#C89B6B"/><rect x="28" y="13" width="8" height="11" rx="2" fill="#8A5A2B"/><circle cx="32" cy="38" r="6" fill="#FFF6EC"/><circle cx="32" cy="38" r="1.7" fill="#F2C94C" stroke="none"/>'),

  chocolate: svg('<rect x="16" y="16" width="32" height="32" rx="3" fill="#7A4A28"/><path d="M24 16v32M32 16v32M40 16v32M16 24h32M16 32h32M16 40h32" stroke="#5A3418" stroke-width="1.6"/>'),

  walnut: svg('<circle cx="32" cy="32" r="18" fill="#D9A566"/><path d="M32 14v36M20 22c8 6 8 14 0 20M44 22c-8 6-8 14 0 20" stroke="#B07A3E"/>'),
  raisin: svg('<path d="M14 34h36c0 9-8 15-18 15s-18-6-18-15z" fill="#F5E7CE"/><ellipse cx="25" cy="40" rx="3.5" ry="3" fill="#5A3A55" stroke="none"/><ellipse cx="33" cy="43" rx="3.5" ry="3" fill="#5A3A55" stroke="none"/><ellipse cx="40" cy="39" rx="3.5" ry="3" fill="#5A3A55" stroke="none"/>'),

  wine: svg('<rect x="27" y="10" width="10" height="14" rx="1" fill="#7A2A3A"/><path d="M25 24h14v22a4 4 0 0 1-4 4h-6a4 4 0 0 1-4-4z" fill="#9B3A4A"/><rect x="28" y="30" width="8" height="12" rx="1" fill="#F5E7CE"/>'),
  lemon: svg('<ellipse cx="32" cy="34" rx="18" ry="13" fill="#F2D94C"/><path d="M50 34c3 0 3 0 4-1M14 34c-3 0-3 0-4-1"/>' + eyes(28, 36, 33, 37) + blush(24, 40, 37)),
  cream: svg('<path d="M22 50h20v-6c6-2 6-14-2-14-1-8-15-8-16 0-8 0-8 12-2 14z" fill="#FFF9EE"/><path d="M32 24c1-4 4-6 6-4" stroke="#F4B8C1"/>'),

function shuffle(a) {
  a = a.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));

  }
  return a;
}

/* ───────────── 스테이션 기대값 ───────────── */
function expectedFor(i) {
  const st = S.kit.stations[i] || {};
  let ings;
  if (st.ing === 'ALL') {
    ings = S.item.ingredients.map((_, k) => k);
  } else {
    ings = [];
    (st.ing || []).forEach(nm => {
      const target = ING_ALIAS[norm(nm)] || nm;
      let k = S.item.ingredients.findIndex(g => g.n === target || norm(g.n) === norm(target));
      if (k < 0) k = S.item.ingredients.findIndex(g => norm(g.n).includes(norm(target)) || norm(target).includes(norm(g.n)));
      if (k >= 0 && !ings.includes(k)) ings.push(k);
    });
  }
  const tools = [];
  (st.tools || []).forEach(nm => {
    let k = S.kit.tools.findIndex(t => t === nm || norm(t) === norm(nm));
    if (k < 0) k = S.kit.tools.findIndex(t => norm(t).includes(norm(nm)) || norm(nm).includes(norm(t)));
    if (k >= 0 && !tools.includes(k)) tools.push(k);
  });
  return { ings, tools };
}

function initStations() {
  S.st = {
    idx: 0, ingTray: [], toolTray: [], graded: false, detail: null,

    ingOrder: shuffle(S.item.ingredients.map((_, i) => i)),

  };
  S.sel = null;
}
function openItem(id, mode) {
  const it = S.items.find(x => x.id === id);
  if (!it || !it.detailed) { toast('이 품목은 아직 상세 데이터가 없습니다'); return; }
  S.item = it;
  S.kit = S.kits[id] || null;
  S.mode = (mode === 'station' && S.kit) ? 'station' : 'order';
  S.view = 'practice';
  initOrder();
  if (S.kit) initStations();
  try { history.replaceState(null, '', '?item=' + encodeURIComponent(id) + '&mode=' + S.mode); } catch (e) {}
  render();
  window.scrollTo(0, 0);
}
function goHome() {
  S.view = 'home'; S.item = null; S.kit = null; S.sel = null;
  try { history.replaceState(null, '', location.pathname); } catch (e) {}
  render();
  window.scrollTo(0, 0);
}

/* ── 공정 순서 보드 ── */
function renderOrder() {
  const area = document.getElementById('mode-area');
  const o = S.order;
  const steps = S.item.steps;

  let banner = '';
  if (o.graded) {
    const score = o.slots.filter((v, i) => v === i).length;
    banner = score === steps.length
      ? '<div class="banner good">완벽합니다! ' + steps.length + '개 공정을 모두 맞혔습니다.</div>'
      : '<div class="banner bad">' + score + ' / ' + steps.length + ' — 틀린 칸의 카드를 옮겨 다시 채점해 보세요.</div>';
  }

  const slots = o.slots.map((v, i) => {
    let cls = 'slot', mark = '', inner;
    if (o.graded && v !== null) {
      const ok = v === i;
      cls += ok ? ' ok' : ' bad';
      mark = '<span class="mark">' + (ok ? '✓' : '✗') + '</span>';
    } else if (o.graded && v === null) {
      cls += ' bad';
      mark = '<span class="mark">✗</span>';
    }
    inner = v === null
      ? '<span class="slot-hint">여기에 공정 카드</span>'
      : stepCardHTML(v);
    return '<div class="' + cls + '" data-drop="slot" data-slot="' + i + '"><span class="num">' + (i + 1) + '</span>' + mark + inner + '</div>';
  }).join('');

  const pool = o.pool.map(i => stepCardHTML(i)).join('');
  const answer = S.showAnswer
    ? '<div class="answer-box"><strong>정답</strong> — ' + steps.map((st, i) => (i + 1) + ' ' + esc(st.t)).join('  →  ') + '</div>'
    : '';

  area.innerHTML =
    '<div class="panel">' +
    '<h3>공정 순서 보드</h3>' +
    '<p class="hint">아래 섞인 공정 카드를 <strong>1번부터 순서대로</strong> 빈칸에 올려놓으세요. 카드를 끌어다 놓거나, 카드를 누른 뒤 빈칸을 눌러도 됩니다.</p>' +
    '<div class="toolbar">' +
    '<button class="act" data-action="grade-order">채점하기</button>' +
    '<button class="ghost-btn" data-action="reshuffle">다시 섞기</button>' +
    (o.graded ? '<button class="ghost-btn" data-action="toggle-answer">' + (S.showAnswer ? '정답 가리기' : '정답 보기') + '</button>' : '') +
    '<label class="toggle-lab"><input type="checkbox" id="desc-toggle"' + (S.showDesc ? ' checked' : '') + '> 카드 설명 보기</label>' +
    '</div>' +
    banner +
    '<div class="order-grid">' + slots + '</div>' +
    answer +
    '<div class="pool-wrap" data-drop="pool">' +
    '<p class="pool-title">공정 카드 (' + o.pool.length + '장 남음)</p>' +
    '<div class="order-grid">' + pool + '</div>' +
    (o.pool.length === 0 ? '<p style="font-size:12px;color:#B3A48C;margin:8px 0 0">카드를 모두 배치했습니다 — 채점해 보세요!</p>' : '') +
    '</div>' +
    '</div>';

  const dt = document.getElementById('desc-toggle');
  if (dt) dt.addEventListener('change', () => { S.showDesc = dt.checked; render(); });
  restoreSelection();
}

/* ── 스테이션 실습 ── */
function renderStation() {
  const area = document.getElementById('mode-area');
  const st = S.st;
  const stations = S.kit.stations;
  const steps = S.item.steps;

  if (st.done) {
    const perfect = st.results.filter(Boolean).length;
    area.innerHTML =
      '<div class="panel">' +
      '<h3>스테이션 실습 결과</h3>' +
      '<div class="banner ' + (perfect === stations.length ? 'good' : 'info') + '" style="margin-top:10px">' +
      (perfect === stations.length ? '전 스테이션 완벽! 실제 시험 동선이 손에 익었습니다.' : perfect + ' / ' + stations.length + ' 스테이션 정확 — 틀린 단계를 다시 확인해 보세요.') +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:8px">' +
      st.results.map((ok, i) => {
        const nm = steps[i] ? steps[i].t : '단계 ' + (i + 1);
        return '<div class="sum-row"><span class="' + (ok ? 'r-ok' : 'r-no') + '">' + (ok ? '✓' : '✗') + '</span><strong>' + (i + 1) + '. ' + esc(nm) + '</strong></div>';
      }).join('') +
      '</div>' +
      '<div class="toolbar" style="margin-top:16px;margin-bottom:0">' +
      '<button class="act" data-action="restart-st">처음부터 다시</button>' +
      '<button class="ghost-btn" data-mode="order">공정 순서 보드로</button>' +
      '</div></div>';
    return;
  }

  const i = st.idx;
  const stDef = stations[i];
  const step = steps[i] || { t: '단계 ' + (i + 1), b: '', d: '' };
  const exp = expectedFor(i);

  const dots = stations.map((_, k) => {
    let cls = 'st-dot';
    if (k < st.results.length) cls += st.results[k] ? ' pass' : ' fail';
    else if (k === i) cls += ' cur';
    return '<span class="' + cls + '">' + (k + 1) + '</span>';
  }).join('');

  const gradeOf = (kind, id) => {
    if (!st.graded) return null;
    const expSet = kind === 'ing' ? exp.ings : exp.tools;
    return expSet.includes(id) ? 'ok' : 'bad';
  };

  const trayCards = (arr, kind) => arr.length
    ? arr.map(id => (kind === 'ing' ? ingCardHTML(id, { grade: gradeOf('ing', id) }) : toolCardHTML(id, { grade: gradeOf('tool', id) }))).join('')
    : '<span class="t-empty">' + (kind === 'ing' ? '재료 카드를 올려놓으세요 (없다고 판단되면 비워두기)' : '도구 카드를 올려놓으세요') + '</span>';

  let feedback = '';
  if (st.graded && st.detail) {
    const d = st.detail;
    feedback += d.perfect
      ? '<div class="banner good">정확합니다! 이 단계의 재료·도구를 완벽하게 골랐습니다.</div>'
      : '<div class="banner bad">아쉽습니다 — 빨간 카드는 이 단계에 필요 없는 카드입니다.</div>';
    if (d.missIng.length || d.missTool.length) {
      feedback += '<div class="miss-box"><strong>빠뜨린 카드</strong> — ' +
        [...d.missIng.map(k => '재료 · ' + esc(S.item.ingredients[k].n)), ...d.missTool.map(k => '도구 · ' + esc(S.kit.tools[k]))].join(' / ') +
        '</div>';
    }
    feedback += '<div class="answer-box" style="margin:0 0 12px"><strong>정답</strong> — 재료: ' +
      (exp.ings.length ? exp.ings.map(k => esc(S.item.ingredients[k].n)).join(', ') : '없음') +
      ' / 도구: ' + (exp.tools.length ? exp.tools.map(k => esc(S.kit.tools[k])).join(', ') : '없음') + '</div>';
  }

  const poolIng = st.ingOrder.filter(id => !st.ingTray.includes(id)).map(id => ingCardHTML(id)).join('');
  const poolTool = st.toolOrder.filter(id => !st.toolTray.includes(id)).map(id => toolCardHTML(id)).join('');

  area.innerHTML =
    '<div class="panel">' +
    '<h3>스테이션 실습</h3>' +
    '<p class="hint">실제 시험 동선 그대로, <strong>이 단계에서 쓰는 재료·도구 카드만</strong> 골라 트레이에 올린 뒤 확인하세요. 재료가 필요 없는 단계도 있습니다.</p>' +
    '<div class="st-progress">' + dots + '<span style="font-size:12px;color:#8A7360;margin-left:4px">' + (i + 1) + ' / ' + stations.length + '</span></div>' +
    '<div class="station-head">' +
    '<span class="snum">' + (i + 1) + '</span>' +
    '<span class="sicon" style="background-image:url(\'' + stepIconSrc(step.t) + '\')"></span>' +
    '<span class="snm">' + esc(step.t) + '</span>' +
    (step.b ? '<span class="sbdg">' + esc(step.b) + '</span>' : '') +
    (stDef.ask ? '<span class="sask">💭 ' + esc(stDef.ask) + '</span>' : '') +
    '</div>' +
    '<div class="trays">' +
    '<div class="tray" data-drop="ing-tray"><div class="t-title">재료 트레이</div><div class="t-cards">' + trayCards(st.ingTray, 'ing') + '</div></div>' +
    '<div class="tray tool-tray" data-drop="tool-tray"><div class="t-title">도구 트레이</div><div class="t-cards">' + trayCards(st.toolTray, 'tool') + '</div></div>' +
    '</div>' +
    feedback +
    '<div class="toolbar" style="margin-bottom:0">' +
    (st.graded
      ? '<button class="act" data-action="next-st">' + (i === stations.length - 1 ? '결과 보기' : '다음 스테이션 →') + '</button>' +
        '<button class="ghost-btn" data-action="retry-st">이 단계 다시</button>'
      : '<button class="act" data-action="grade-st">확인하기</button>') +
    '</div>' +
    '<div class="st-pools">' +
    '<div><p class="pool-title">재료 카드</p><div class="st-pool-grid" data-drop="pool">' + (poolIng || '<span style="font-size:12px;color:#B3A48C">모두 사용 중</span>') + '</div></div>' +
    '<div><p class="pool-title">도구 카드</p><div class="st-pool-grid" data-drop="pool">' + (poolTool || '<span style="font-size:12px;color:#B3A48C">모두 사용 중</span>') + '</div></div>' +
    '</div>' +
    '</div>';
  restoreSelection();
}

function restoreSelection() {
  if (!S.sel) return;
  const el = root.querySelector('.card[data-card="' + S.sel.kind + '"][data-id="' + S.sel.id + '"]');
  if (el && isInPool(el)) el.classList.add('selected');
  else S.sel = null;
}
function isInPool(cardEl) {
  return !!cardEl.closest('[data-drop="pool"]');
}

/* ───────────── 배치 로직 ───────────── */
function clearGrading() {
  if (S.mode === 'order') { S.order.graded = false; S.showAnswer = false; }
  else { S.st.graded = false; S.st.detail = null; }
}

function placeCard(kind, id, dropEl) {
  const dropType = dropEl.getAttribute('data-drop');
  if (S.mode === 'order') {
    if (kind !== 'step') return false;
    if (dropType === 'slot') {
      const si = +dropEl.getAttribute('data-slot');
      const o = S.order;
      const from = o.slots.indexOf(id);
      if (from === si) return true;
      const occupant = o.slots[si];
      if (from >= 0) o.slots[from] = null; else o.pool = o.pool.filter(x => x !== id);
      if (occupant !== null) o.pool.push(occupant);
      o.slots[si] = id;
      clearGrading();
      return true;
    }
    if (dropType === 'pool') return returnCard(kind, id);
    return false;
  }
  // station mode
  if (dropType === 'ing-tray') {
    if (kind !== 'ing') { toast('재료 트레이에는 재료 카드만 놓을 수 있습니다'); return false; }
    if (!S.st.ingTray.includes(id)) S.st.ingTray.push(id);
    clearGrading();
    return true;
  }
  if (dropType === 'tool-tray') {
    if (kind !== 'tool') { toast('도구 트레이에는 도구 카드만 놓을 수 있습니다'); return false; }
    if (!S.st.toolTray.includes(id)) S.st.toolTray.push(id);
    clearGrading();
    return true;
  }
  if (dropType === 'pool') return returnCard(kind, id);
  return false;
}

function returnCard(kind, id) {
  if (S.mode === 'order') {
    const o = S.order;
    const from = o.slots.indexOf(id);
    if (from >= 0) { o.slots[from] = null; o.pool.push(id); clearGrading(); return true; }
    return false;
  }
  if (kind === 'ing' && S.st.ingTray.includes(id)) { S.st.ingTray = S.st.ingTray.filter(x => x !== id); clearGrading(); return true; }
  if (kind === 'tool' && S.st.toolTray.includes(id)) { S.st.toolTray = S.st.toolTray.filter(x => x !== id); clearGrading(); return true; }
  return false;
}

/* ───────────── 채점 ───────────── */
function gradeOrder() {
  const o = S.order;
  if (o.slots.some(v => v === null)) { toast('카드를 모두 배치한 뒤 채점하세요 (' + o.pool.length + '장 남음)'); return; }
  o.graded = true;
  S.sel = null;
  const score = o.slots.filter((v, i) => v === i).length;
  saveRec(S.item.id, { order: score + '/' + o.slots.length });
  render();
}
function gradeStation() {
  const st = S.st, exp = expectedFor(st.idx);
  const setEq = (a, b) => a.length === b.length && a.every(x => b.includes(x));
  const missIng = exp.ings.filter(k => !st.ingTray.includes(k));
  const missTool = exp.tools.filter(k => !st.toolTray.includes(k));
  const perfect = setEq(st.ingTray, exp.ings) && setEq(st.toolTray, exp.tools);
  st.graded = true;
  st.detail = { perfect, missIng, missTool };
  S.sel = null;
  render();
}
function nextStation() {
  const st = S.st;
  st.results.push(st.detail ? st.detail.perfect : false);
  if (st.idx >= S.kit.stations.length - 1) {
    st.done = true;
    saveRec(S.item.id, { station: st.results.filter(Boolean).length + '/' + S.kit.stations.length });
  } else {
    st.idx++;
    st.ingTray = []; st.toolTray = []; st.graded = false; st.detail = null;
    st.ingOrder = shuffle(st.ingOrder);
    st.toolOrder = shuffle(st.toolOrder);
  }
  render();
  window.scrollTo(0, 0);
}

/* ───────────── 클릭(위임) ───────────── */
let suppressClick = false;
root.addEventListener('click', e => {
  if (suppressClick) { suppressClick = false; return; }
  const t = e.target;

  const openEl = t.closest('[data-open]');
  if (openEl) { openItem(openEl.getAttribute('data-open')); return; }
  const drawEl = t.closest('[data-draw]');
  if (drawEl) {
    const list = S.items.filter(x => x.exam === drawEl.getAttribute('data-draw') && x.detailed);
    if (list.length) openItem(list[Math.floor(Math.random() * list.length)].id);
    return;
  }
  const filterEl = t.closest('[data-filter]');
  if (filterEl) { S.filter = filterEl.getAttribute('data-filter'); render(); return; }
  const modeEl = t.closest('[data-mode]');
  if (modeEl) { S.mode = modeEl.getAttribute('data-mode'); S.sel = null; try { history.replaceState(null, '', '?item=' + encodeURIComponent(S.item.id) + '&mode=' + S.mode); } catch (err) {} render(); return; }
  const actEl = t.closest('[data-action]');
  if (actEl) {
    const a = actEl.getAttribute('data-action');
    if (a === 'home') goHome();
    else if (a === 'grade-order') gradeOrder();
    else if (a === 'reshuffle') { initOrder(); render(); }
    else if (a === 'toggle-answer') { S.showAnswer = !S.showAnswer; render(); }
    else if (a === 'grade-st') gradeStation();
    else if (a === 'next-st') nextStation();
    else if (a === 'retry-st') { S.st.ingTray = []; S.st.toolTray = []; S.st.graded = false; S.st.detail = null; render(); }
    else if (a === 'restart-st') { initStations(); render(); }
    return;
  }

  const card = t.closest('.card[data-card]');
  if (card) {
    const kind = card.getAttribute('data-card');
    const id = +card.getAttribute('data-id');
    if (isInPool(card)) {
      if (S.sel && S.sel.kind === kind && S.sel.id === id) { S.sel = null; card.classList.remove('selected'); }
      else {
        root.querySelectorAll('.card.selected').forEach(c => c.classList.remove('selected'));
        S.sel = { kind, id };
        card.classList.add('selected');
        toast(S.mode === 'order' ? '놓을 칸을 누르세요 (다시 누르면 취소)' : '트레이를 누르세요 (다시 누르면 취소)');
      }
    } else {
      if (returnCard(kind, id)) render();
    }
    return;
  }

  const dropEl = t.closest('[data-drop]');
  if (dropEl && S.sel) {
    const { kind, id } = S.sel;
    S.sel = null;
    if (placeCard(kind, id, dropEl)) render();
  }
});

/* ───────────── 드래그 ───────────── */
const drag = { active: false, started: false, card: null, kind: null, id: 0, sx: 0, sy: 0, ox: 0, oy: 0, ghost: null, over: null, ptype: 'mouse' };

root.addEventListener('pointerdown', e => {
  const card = e.target.closest('.card[data-card]');
  if (!card || e.button > 0) return;
  drag.active = true; drag.started = false;
  drag.card = card;
  drag.kind = card.getAttribute('data-card');
  drag.id = +card.getAttribute('data-id');
  drag.sx = e.clientX; drag.sy = e.clientY;
  drag.ptype = e.pointerType || 'mouse';
  const r = card.getBoundingClientRect();
  drag.ox = e.clientX - r.left; drag.oy = e.clientY - r.top;
});

document.addEventListener('pointermove', e => {
  if (!drag.active) return;
  const dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
  if (!drag.started) {
    const dist = Math.hypot(dx, dy);
    const horiz = Math.abs(dx) > 8 && Math.abs(dx) > Math.abs(dy);
    if ((drag.ptype === 'mouse' && dist > 6) || (drag.ptype !== 'mouse' && horiz)) startDrag(e);
    else return;
  }
  e.preventDefault();
  moveGhost(e);
  const under = document.elementFromPoint(e.clientX, e.clientY);
  const dropEl = under ? under.closest('[data-drop]') : null;
  if (drag.over && drag.over !== dropEl) drag.over.classList.remove('drop-hint');
  if (dropEl && dropEl !== drag.over) dropEl.classList.add('drop-hint');
  drag.over = dropEl;
}, { passive: false });

function startDrag(e) {
  drag.started = true;
  suppressClick = false;
  const r = drag.card.getBoundingClientRect();
  const g = drag.card.cloneNode(true);
  g.id = 'drag-ghost';
  g.classList.remove('selected');
  g.style.width = r.width + 'px';
  g.style.height = r.height + 'px';
  document.body.appendChild(g);
  drag.ghost = g;
  drag.card.classList.add('dragging');
  document.body.style.userSelect = 'none';
  moveGhost(e);
}
function moveGhost(e) {
  if (drag.ghost) drag.ghost.style.transform = 'translate(' + (e.clientX - drag.ox) + 'px,' + (e.clientY - drag.oy) + 'px) rotate(2deg)';
}
function endDrag(commit, e) {
  if (drag.over) drag.over.classList.remove('drop-hint');
  if (drag.ghost) drag.ghost.remove();
  if (drag.card) drag.card.classList.remove('dragging');
  document.body.style.userSelect = '';
  if (commit && drag.started && drag.over) {
    S.sel = null;
    if (placeCard(drag.kind, drag.id, drag.over)) render();
  }
  if (drag.started) suppressClick = true;
  drag.active = false; drag.started = false; drag.ghost = null; drag.over = null; drag.card = null;
}
document.addEventListener('pointerup', e => { if (drag.active) endDrag(true, e); });
document.addEventListener('pointercancel', () => { if (drag.active) endDrag(false); });

/* ───────────── 부팅 ───────────── */
Promise.all([
  fetch('./items-data.json').then(r => r.json()),
  fetch('./kit-data.json').then(r => r.json())
]).then(([d, k]) => {
  S.items = d.items || [];
  S.kits = k || {};
  let params;
  try { params = new URLSearchParams(location.search); } catch (e) { params = new URLSearchParams(); }
  const id = params.get('item');
  if (id && S.items.some(x => x.id === id && x.detailed)) openItem(id, params.get('mode'));
  else render();
}).catch(err => {
  root.innerHTML = '<p style="padding:40px 0;text-align:center;color:#B04A38;font-weight:700">데이터를 불러오지 못했습니다. 새로고침해 주세요.</p>';
  console.error(err);
});

})();
</script>
</body>
</html>
